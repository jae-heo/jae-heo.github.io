<div style="text-align: center; margin-bottom: 20px;">
  <img src="{{ site.baseurl }}{{ include.src }}" alt="{{ include.alt }}" style="display: block; margin: 0 auto; width: {{ include.width }}px; height: auto; border: 2px solid #000;">
  {% if include.caption %}
  <p style="font-style: italic; font-size: 0.9em; margin-top: 5px; text-align: center;">{{ include.caption }}</p>
  {% endif %}
</div>
