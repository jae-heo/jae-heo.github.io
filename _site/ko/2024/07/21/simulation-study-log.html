## 개요

파이썬 인터프리터는 **GIL**이라는 개념을 통해 안전하게 동시성을 관리했습니다.
이것은 **파이썬의 느슨함과 편리함**을 위하여 꼭 필요한 개념이었는데요, 실제로 파이썬으로 코딩을 하다보면 간편한 것을 느낄 수 있습니다.
하지만 하드웨어의 성능이 좋아지며, 기존에 파이썬을 사용하던 사람들은 **구조적인 한계로 오는 성능의 제약**을 마주합니다.

## GIL 은 왜 있나요?

Global Interpreter Lock이라고도 불리는 GIL은 파이썬의 중간코드(바이트코드)가 병렬로 실행되지 못하도록 막습니다.
종종 Single core만 사용하도록 만든다고 정의를 하는 경우도 있는데, 엄밀하지는 않습니다. **'한번에 하나의 스레드의 바이트 코드만 실행하게 해준다'** 가 엄밀한 정의입니다.
실제로 I/O 작업의 경우 GIL이 해제되어 다른 스레드가 실행될 수 있습니다. 즉 파일을 읽고 쓰는 작업에서는 멀티스레딩이 효과적입니다. 프로그래밍 용어로는 'I/O Bound 작업에서 효과적이다' 라고 할 수 있습니다.
CPU 집약적인 작업에서는 GIL로 인해 병렬처리가 제한됩니다. 즉 스레딩을 적용하지 않은 코드의 성능이 더 좋다는 뜻입니다.

GIL을 사용하는 것은 손해만 있는 것 같은데, 왜 사용할까요?
실제로는 여러 이점이 있습니다.
1. Object의 **Reference Counter를 조작하고 확인하는데 안전**합니다.
2. 여러 자료구조에서 **Race Condition에 대한 안정성**이 보장됩니다.
3. **코드가 더 느슨**해질 수 있도록 도와줍니다. (Easy to code)
이러한 장점들을 기반으로 파이썬은 유명해지고, 더 많은 사람들이 쉽게 사용할 수 있습니다. 

## GIL을 제거하려는 이유

**하드웨어의 성능이 향상**되며 GIL 설계 당시 고려되지 않은 CPU 작업의 multi threading이 중요해졌습니다.
앞서 설명드린대로, GIL은 **파이썬 바이트코드의 병렬실행을 막으므로 CPU 작업의 병렬성을 제한**합니다.

이전에도 파이썬의 GIL을 없애거나 우회하려는 시도는 많았지만, 실제로 상용화 된 방법론은 없었습니다. 파이썬의 많은 부분이 GIL의 개념을 토대로 발전했고, 그렇기 떄문에 기존의 호환성을 유지하며 GIL을 없애는 시도를 성공한 방법은 없습니다.
Cython, C-Module 등 우회적으로 다른 언어를 모듈화시켜 참조하는 방법으로 발전이 되었고, 이러한 방식으로 구현된 유명한 라이브러리는 Numpy가 있습니다.

하지만 이런 방법은 한계점이 있습니다. 파이썬의 장점을 포기해야하고, 귀찮은 Boiler plate 코드를 작성해야합니다. 또한 컴파일이 용이하지 않습니다.

## GIL을 제거하지 못하는 이유

파이썬의 **Garbage collection은 Object의 Reference counting을 보고 판단**합니다. 만약 특정 Object의 Reference counting(해당 객체의 레퍼런스를 가지고 있는 변수의 수)가 0이 된다면 해당 객체는 Dangling 객체이고, 메모리에서 청소합니다. 하지만 이 방식은 멀티쓰레딩에서 문제가 있습니다. **Reference counting 변수에 대한 접근이 GIL을 통해 안정성을 보장받았었는데, GIL이 삭제되면 더이상 Thread safe 하지 않기 떄문**입니다.

만약 이러한 문제들을 해결하지 않고 GIL을 제거한다면, 각 Object Reference Counting에 대한 안정성을 개발자가 직접 관리해야하며, 이것은 위험한 프로그래밍이 될 것입니다.
그렇게 된다면 파이썬을 더이상 사용하지 않고 기존에 Memory safe 하지 않지만 다른 방면(속도, 메모리 등)에서 좋은 이점을 가져간 언어로 갈아타는 것이 더 편할 것입니다.

## 그렇다면 GIL을 어떻게 제거하나요?

[PEP703](https://peps.python.org/pep-0703/?adobe_mc=MCMID%3D31799985124747914150554653797973339933%7CMCORGID%3DA8833BC75245AF9E0A490D4D%2540AdobeOrg%7CTS%3D1724483280){:target="_blank"}에는 이것을 세 가지 방법으로 해결하는 것을 제시하는데요
- 객체의 불멸화

특정 객체들을 Reference counting의 관리가 필요없는 객체(변수)로 설정해서 GC에서 관리하지 않도록 최적화를 하는 방식으로 생각됩니다. 기존에는 interning이라는 기법으로 관리되던 것들을 포함하여 더 많은 객체들을 포함하여 관리되도록 변경되었습니다.

- 지연 참조 카운팅 (Delay, Transactional and Asynchronous)

최적화 기법입니다. 상위레벨에서 자주 사용되는 레퍼런스에 대해서 참조 카운트 연산을 줄입니다. 하지만 문제는 이런 객체들은 GC가 동작할때에만 수집될 수 있습니다.

- 편향 참조 카운팅 (Thread biased reference count control)

참조 카운팅을 Local thread에서는 non-atomic 한 참조 카운트를, Outer thread에서는 atomic한 참조 카운트를 해 성능을 향상하려는 목적의 기능입니다.

## 개인적인 의견

파이썬 진영에서는 이러한 기능들을 이용해 GIL을 제거하고 기존의 파이선 코드를 유지하려고 하고 있습니다. 개인적으로는 이미 다른 언어들에도 있는 기능들이 이제서야 Pythonic 하게 Integrated 되는게 아닌지, 생각을 해봅니다. 결국 폰노이만 구조에서 오는 한계에 의하여 현대의 대부분의 컴파일러, 인터프리터는 이런 최적화 기능을 포함토록 하는 경향을 보입니다.
